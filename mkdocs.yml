site_name: SOCRATIC
site_description: Socratic debate notes and replies
repo_url: https://github.com/PlebeiusGaragicus/SOCRATIC
repo_name: PlebeiusGaragicus/SOCRATIC

# MkDocs requires a child of the config file; pages/ symlinks to repo-root content.
docs_dir: pages

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: README.md
  - How to debate:
    - Overview: how-to-debate/SKILL.md
    - Socratic method: how-to-debate/references/socratic-method.md
    - Argument structure: how-to-debate/references/argument-data-structure.md
    - Vibecoding example: how-to-debate/references/vibecoding-example.md
  - Israel:
    - Prompt: ISRAEL/prompt.md
    - Initial questions: ISRAEL/replies/initial-questions.md
    - Reply: ISRAEL/replies/reply.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search
