site_name: SOCRATIC
site_description: Socratic debate notes and replies
repo_url: https://github.com/PlebeiusGaragicus/SOCRATIC
repo_name: PlebeiusGaragicus/SOCRATIC

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: README.md
  - How to debate:
    - Overview: how-to-debate/SKILL.md
    - Socratic method: how-to-debate/references/socratic-method.md
    - Argument structure: how-to-debate/references/argument-data-structure.md
    - Vibecoding example: how-to-debate/references/vibecoding-example.md
  - Israel:
    - Initial prompt: ISRAEL/initial-prompt.md
    - Initial reply: ISRAEL/initial-reply.md
    - Questions: ISRAEL/questions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search
